name: CI

on:
  push:
    branches:
      - 'feature/**'
      - 'claude/**'
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest
    env:
      NEXTAUTH_SECRET: ci-secret-do-not-use-in-production
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -- --ci --forceExit

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint
